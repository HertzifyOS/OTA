name: Add Device

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand (e.g. Xiaomi, Samsung)"
        required: true
        default: "Xiaomi"

      codename:
        description: "Device codename"
        required: true

      device_name:
        description: "Device name"
        required: true

      maintainer:
        description: "Maintainer username"
        required: true

      github_user:
        description: "GitHub username"
        required: true

      tg_username:
        description: "Telegram username"
        required: true

concurrency:
  group: hertzifyos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  add-device:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate & Update Files
        env:
          BRAND: ${{ github.event.inputs.brand }}
          CODENAME: ${{ github.event.inputs.codename }}
          DEVICE_NAME: ${{ github.event.inputs.device_name }}
          MAINTAINER: ${{ github.event.inputs.maintainer }}
          GITHUB_USER: ${{ github.event.inputs.github_user }}
          TG_USER: ${{ github.event.inputs.tg_username }}
        run: |
          # Update device list
          if grep -qE "^${CODENAME}$" devices/hertzify.devices; then
            echo "::error::Device already exists"
            exit 1
          fi

          echo "$CODENAME" >> devices/hertzify.devices

          python3 <<EOF
          import json
          import os

          path = "devices/devices.json"

          with open(path) as f:
              data = json.load(f)

          brand = os.environ["BRAND"]

          new_device = {
              "name": os.environ["DEVICE_NAME"],
              "codename": os.environ["CODENAME"],
              "maintainer": os.environ["MAINTAINER"],
              "github": f"https://github.com/{os.environ['GITHUB_USER']}",
              "telegram": f"https://t.me/{os.environ['TG_USER']}",
              "supported_versions": [
                  {
                      "version_code": "Soon",
                      "inactive": False
                  }
              ]
          }

          data.setdefault(brand, [])

          if any(d["codename"] == new_device["codename"] for d in data[brand]):
              raise SystemExit("Device already exists in JSON")

          data[brand].append(new_device)

          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add devices/devices.json devices/hertzify.devices

          git commit -m "feat(ota): add ${{ github.event.inputs.device_name }} (${{ github.event.inputs.codename }})"

          git push

      - name: Telegram Announcement
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: |
          TEXT=$(cat <<EOF
          🎉 <b>Another new device has been added to the official device roster!</b>

          📱 <b>Device:</b> ${{ github.event.inputs.device_name }} (<code>${{ github.event.inputs.codename }}</code>)
          👤 <b>Maintained by:</b> @${{ github.event.inputs.tg_username }}

          🔔 Stay tuned for the first build!
          #HertzifyOS
          EOF
          )

          curl -s \
            -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TG_CHANNEL_ID" \
              --arg text "$TEXT" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "HTML",
                disable_web_page_preview: true
              }'
            )"