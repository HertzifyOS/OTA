name: Remove Device

on:
  workflow_dispatch:
    inputs:
      codename:
        description: "Device codename to remove (e.g. munch)"
        required: true
      device_name:
        description: "Device name for announcement (e.g. Redmi K40S)"
        required: false

concurrency:
  group: hertzifyos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  remove-device:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate & check device exists
        run: |
          CODENAME="${{ github.event.inputs.codename }}"

          if ! echo "$CODENAME" | grep -qE '^[a-z0-9_]+$'; then
            echo "::error::Invalid codename '$CODENAME'."
            exit 1
          fi
          
          if [[ ! -f "builds/gapps/${CODENAME}.json" ]] && [[ ! -f "builds/vanilla/${CODENAME}.json" ]]; then
            echo "::error::Device '$CODENAME' not found."
            exit 1
          fi

          echo "Device '$CODENAME' found, proceeding with removal."

      - name: Remove device files
        run: |
          CODENAME="${{ github.event.inputs.codename }}"

          sed -i "/^${CODENAME}$/d" devices/hertzify.devices

          rm -f \
            "builds/gapps/${CODENAME}.json" \
            "builds/vanilla/${CODENAME}.json" \
            "changelogs/${CODENAME}.txt" \
            "guides/${CODENAME}.txt"

      - name: Commit & push
        run: |
          CODENAME="${{ github.event.inputs.codename }}"
          DEVICE="${{ github.event.inputs.device_name }}"

          if [[ -n "$DEVICE" ]]; then
            LABEL="${DEVICE} (${CODENAME})"
          else
            LABEL="$CODENAME"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: drop ${LABEL} from official roster"
          git push

      - name: Telegram announcement
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: |
          CODENAME="${{ github.event.inputs.codename }}"
          DEVICE="${{ github.event.inputs.device_name }}"

          if [[ -n "$DEVICE" ]]; then
            DISPLAY="<b>${DEVICE}</b> (<code>${CODENAME}</code>)"
          else
            DISPLAY="<code>${CODENAME}</code>"
          fi

          export TEXT="$(printf '<b>Another device has been dropped from the official device roster!</b> 🚀\n\n• %s\n\nMaintainership applications are now open!\n\n#HertzifyOS' \
            "$DISPLAY")"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({'chat_id':os.environ['TG_CHANNEL_ID'],'text':os.environ['TEXT'],'parse_mode':'HTML','disable_web_page_preview':True}))")"
